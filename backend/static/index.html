<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FastAPI Hello</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        color: #032147;
      }
      .card {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 20px;
        max-width: 520px;
        box-shadow: 0 10px 24px rgba(3, 33, 71, 0.08);
      }
      .label {
        color: #888888;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-weight: 600;
      }
      .accent {
        color: #209dd7;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="label">Backend Status</div>
      <h1>Hello from FastAPI</h1>
      <p>
        This page is served by the backend to confirm the container is running.
      </p>
      <p>API says: <span id="api-message" class="accent">Loading...</span></p>
    </div>
    <script>
      fetch("/api/hello")
        .then((response) => response.json())
        .then((data) => {
          const target = document.getElementById("api-message");
          if (target) {
            target.textContent = data.message;
          }
        })
        .catch(() => {
          const target = document.getElementById("api-message");
          if (target) {
            target.textContent = "API call failed";
          }
        });
    </script>
  </body>
</html>
